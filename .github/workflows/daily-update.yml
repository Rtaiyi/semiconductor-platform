name: 每日数据更新

on:
  schedule:
    # 北京时间 9:35, 11:35, 14:35, 15:35 (交易时段)
    - cron: '35 1,3,6,7 * * 1-5'
  # 北京时间 9:00 开盘前更新
    - cron: '0 1 * * 1-5'
  # 手动触发
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 安装Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
      
      - name: 安装依赖
        run: pip install -r requirements.txt
      
      - name: 运行数据抓取
        id: run_fetch
        run: python3 scripts/fetch_all.py
      
      - name: 同步数据到 docs
        run: cp data/realtime_quotes.json data/global_stocks.json data/benchmarks.json data/status.json docs/data/
      
      - name: 提交更新
        run: |
          git config user.name "data-bot"
          git config user.email "bot@semiconductor-platform.local"
          git add data/realtime_quotes.json data/global_stocks.json data/benchmarks.json data/status.json
          git diff --cached --quiet || git commit -m "📊 数据自动更新 $(date +'%Y-%m-%d %H:%M')"
          git push
        if: always() && steps.run_fetch.outcome != 'skipped'
      
      - name: 失败通知
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const date = new Date().toISOString().split('T')[0];
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `⚠️ 数据更新失败 - ${date}`,
              body: `自动数据抓取在 ${date} 执行时遇到错误。\n\n请检查 [Actions 日志](${process.env.GITHUB_SERVER_URL}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) 了解详情。`,
              labels: ['bug', 'automation']
            });
