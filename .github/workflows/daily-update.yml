name: 每日数据更新

on:
  schedule:
    # 北京时间 9:35, 11:35, 14:35, 15:35 (交易时段)
    - cron: '35 1,3,6,7 * * 1-5'
  # 北京时间 9:00 开盘前更新
    - cron: '0 1 * * 1-5'
  # 手动触发
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 安装Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 安装依赖
        run: pip install requests
      
      - name: 运行数据抓取
        run: python3 scripts/fetch_all.py
      
      - name: 提交更新
        run: |
          git config user.name "data-bot"
          git config user.email "bot@semiconductor-platform.local"
          git add data/*.json
          git diff --cached --quiet || git commit -m "📊 数据自动更新 $(date +'%Y-%m-%d %H:%M')"
          git push
